<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FullArt Game</title>
    <style>
        :root {
            --mx: 50%;
            --my: 50%;
            --rx: 0deg;
            --ry: 0deg;
        }

        body {
            background-image: url('фон копия.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0e0e10; 
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
            position: relative;
        }

        /* ЭФФЕКТ ЗАТЕМНЕНИЯ ФОНА */
        #bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            opacity: 0; /* Сначала полностью прозрачный */
            transition: opacity 2s ease; /* Плавное затемнение в течение 2 секунд */
            z-index: 1; /* Поверх фона, но под контентом */
            pointer-events: none; /* Чтобы слой не мешал кликать на кнопки */
        }

        /* Когда добавляем этот класс, фон темнеет до 80% (остается 20% видимости) */
        #bg-overlay.darkened {
            opacity: 0.8;
        }

  #play-btn {
    opacity: 0;
    /* Укажите точные размеры вашего изображения */
    width: 808px; 
    height: 401px;
    
    /* Убираем стандартные рамки и фон */
    border: none;
    background-color: transparent;
    
    /* Добавляем ваше изображение */
    background-image: url('фон буквы копия.png');
    background-size: contain; /* Картинка впишется в размеры кнопки */
    background-position: center;
    background-repeat: no-repeat;
    
    cursor: pointer;
    transition: opacity 2s ease, transform 0.3s ease, filter 0.3s;
    
    /* Если на картинке уже есть текст, уберите текст из HTML кнопки */
    text-indent: -9999px; /* Скрывает текст, если он остался в HTML для SEO */
}

#play-btn.visible { 
    opacity: 1; 
}

#play-btn:hover {
    /* Вместо изменения цвета фона добавим легкое свечение или увеличение */
    filter: brightness(1.2) drop-shadow(0 0 10px rgba(236, 247, 255, 0.8));
    transform: scale(1.05);
}

        #countdown {
            display: none;
            font-size: 100px;
            font-weight: bold;
            color: #b0ed9f;
            text-shadow: 0 0 20px rgba(103, 193, 245, 0.8);
            z-index: 10;
        }

        /* КАРТОЧКА */
        .card-container {
            display: none;
            width: 325px;
            height: 519px;
            perspective: 1000px;
            z-index: 10; /* Поднимаем выше оверлея */
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(var(--rx)) rotateY(var(--ry));
            transition: transform 0.1s ease-out;
            cursor: pointer;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg) rotateX(0deg) !important;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card-face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-size: cover;
            background-position: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .card-back {
            transform: rotateY(180deg);
        }

        /* Блик (Steam эффект) */
        .card-face::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(125deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 200%;
            background-position: var(--mx) var(--my);
            mix-blend-mode: overlay;
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 25px;
        }

        .card-container:hover .card-face::after {
            opacity: 1;
        }

        /* КНОПКА ДАЛЕЕ */
        #next-arrow {
            display: none;
            margin-top: 30px;
            padding: 12px 30px;
            background: rgba(236, 247, 255, 0.2);
            border: 2px solid #edf5fa;
            color: #edf5fa;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
            z-index: 10;
        }

        #next-arrow.visible {
            display: block;
        }
    </style>
</head>
<body>

    <div id="bg-overlay"></div>

    <button id="play-btn">FullArt</button>
    <div id="countdown">3</div>

    <div class="card-container" id="card-container">
        <div class="card-inner" id="card-inner">
            <div class="card-face card-front" id="card-front"></div>
            <div class="card-face card-back" id="card-back"></div>
        </div>
    </div>

    <button id="next-arrow">Следующая карта ➡</button>

    <script>
        const deck = [
          { front: 'кресло капуста.png', back: 'кресло капуста тект.png' },
            { front: 'люстра необ.png', back: 'люстра необ текст.png' },
            { front: 'прозрачный стул.png', back: 'прозрачный стул текст.png' },
             { front: 'диван марио.png', back: 'диван марио текст.png' },
         { front: 'кушетка тапис.png', back: 'кушетка тапис текст.png' },
         { front: 'зеттелз.png', back: 'зеттелз текст.png' },
         { front: 'стол е.png', back: 'стол е текст.png' },
         { front: 'фловер пот.png', back: 'фловер пот теккст.png' },
         { front: 'кресло вигл.png', back: 'кресло вигл текст.png' },
             { front: 'полка червь.png', back: 'полка червь текст.png' },
            { front: 'барселона.png', back: 'барселона текст.png' },
             { front: 'телефон.png', back: 'телефон текст.png' },
            { front: 'шкаф мульт .png', back: 'шкаф мульт текст.png' },
            { front: 'чайник.png', back: 'чайник текст.png' },
              { front: 'кресло куб.png', back: 'кресло куб текст.png' },
            { front: 'табурет 60.png', back: 'табурет 60 текст.png' },
            { front: 'эл чайник.png', back: 'эл чайник текст.png' },
            { front: 'стул эльда.png', back: 'стул эльда текст.png' },
            { front: 'стеллаж облако.png', back: 'стеллаж облако текст.png' },
            { front: 'зеркало.png', back: 'зеркало текст.png' },
            { front: 'заха хадид.png', back: 'заха хадид текст.png' },
            { front: '14.png', back: '14 текст.png' },
            { front: 'губы.png', back: 'губы текст.png' },
            { front: 'кофейный столик.png', back: 'кофейный столик текст.png' },
            { front: 'кресло фавелла.png', back: 'кресло фавелла текст.png.png' },
            { front: 'хилл хаус.png', back: 'хилл хаус текст.png' },
            { front: 'лампа артишок.png', back: 'лампа артишок текст.png' },
        ];
        
        let currentIndex = 0;

        const playBtn = document.getElementById('play-btn');
        const overlay = document.getElementById('bg-overlay');
        const countdownEl = document.getElementById('countdown');
        const cardContainer = document.getElementById('card-container');
        const cardInner = document.getElementById('card-inner');
        const cardFront = document.getElementById('card-front');
        const cardBack = document.getElementById('card-back');
        const nextArrow = document.getElementById('next-arrow');

        setTimeout(() => playBtn.classList.add('visible'), 500);

        function updateCardImages() {
            cardFront.style.backgroundImage = `url('${deck[currentIndex].front}')`;
            cardBack.style.backgroundImage = `url('${deck[currentIndex].back}')`;
        }

        playBtn.addEventListener('click', () => {
            playBtn.style.display = 'none';
            
            // ЗАПУСКАЕМ ЗАТЕМНЕНИЕ ФОНА
            overlay.classList.add('darkened');
            
            countdownEl.style.display = 'block';
            let count = 3;
            countdownEl.innerText = count;

            const timer = setInterval(() => {
                count--;
                if (count <= 0) {
                    clearInterval(timer);
                    countdownEl.style.display = 'none';
                    updateCardImages();
                    cardContainer.style.display = 'block';
                } else {
                    countdownEl.innerText = count;
                }
            }, 800);
        });

        cardInner.addEventListener('click', () => {
            if (!cardContainer.classList.contains('flipped')) {
                cardContainer.classList.add('flipped');
                setTimeout(() => nextArrow.classList.add('visible'), 600);
            }
        });

        nextArrow.addEventListener('click', () => {
            nextArrow.classList.remove('visible');
            cardContainer.classList.remove('flipped');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % deck.length;
                updateCardImages();
            }, 600);
        });

        cardContainer.addEventListener('mousemove', (e) => {
            if (cardContainer.classList.contains('flipped')) return;
            const rect = cardContainer.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const rx = ((y / rect.height) - 0.5) * -30;
            const ry = ((x / rect.width) - 0.5) * 30;
            cardContainer.style.setProperty('--mx', `${(x / rect.width) * 100}%`);
            cardContainer.style.setProperty('--my', `${(y / rect.height) * 100}%`);
            cardContainer.style.setProperty('--rx', `${rx}deg`);
            cardContainer.style.setProperty('--ry', `${ry}deg`);
        });

        cardContainer.addEventListener('mouseleave', () => {
            cardContainer.style.setProperty('--rx', '0deg');
            cardContainer.style.setProperty('--ry', '0deg');
        });
    </script>
</body>
</html>
