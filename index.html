<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FullArt</title>
    <style>
        /* =========================================
           НАСТРОЙКИ КАРТИНОК И ПЕРЕМЕННЫХ
        ========================================= */
        :root {
            --mx: 50%;
            --my: 50%;
            --rx: 0deg;
            --ry: 0deg;
        }

        body {
            /* ФОН СТРАНИЦЫ: */
            background-image: url('фон.jpg'); 
            background-size: 110% 110%; 
            background-position: center;
            background-repeat: no-repeat;
            background-color: #0e0e10; 
            
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column; /* Добавили, чтобы элементы выстраивались в колонку */
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;

            animation: floatingBackground 15s ease-in-out infinite;
        }

        @keyframes floatingBackground {
            0% { background-position: 50% 50%; }
            50% { background-position: 48% 52%; }
            100% { background-position: 50% 50%; }
        }

        #play-btn {
            opacity: 0;
            width: 764px; 
            height: 763px;
            border: none;
            background-color: transparent;
            background-image: url('кнопка копия.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            transition: opacity 2s ease, transform 0.3s ease, filter 0.3s;
            text-indent: -9999px; 
            position: absolute; /* Чтобы кнопка не сдвигала другие элементы */
        }

        #play-btn.visible { 
            opacity: 1; 
        }

        #play-btn:hover {
            filter: brightness(1.2) drop-shadow(0 0 10px rgba(103, 193, 245, 0.8));
            transform: scale(1.05);
        }

        #countdown {
            display: none;
            font-size: 80px;
            font-weight: bold;
            color: #67c1f5;
            position: absolute;
        }

        /* =========================================
           STEAM CARD EFFECT
        ========================================= */

        .card-container {
            display: none;
            width: 300px;
            height: 450px;
            perspective: 1000px; 
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(var(--rx)) rotateY(var(--ry));
            transition: transform 0.1s ease-out;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg) rotateX(0deg) !important;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card-face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            /* Картинки теперь задаются через JS */
            background-size: cover;
            background-position: center;
        }

        .card-front {
            background-color: #222;
        }

        .card-back {
            background-color: #333;
            transform: rotateY(180deg);
        }

        .card-face::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                125deg,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0) 30%,
                rgba(255,255,255,0.1) 40%,
                rgba(255,255,255,0.4) 50%,
                rgba(255,255,255,0.1) 60%,
                rgba(255,255,255,0) 70%,
                rgba(255,255,255,0) 100%
            ),
            radial-gradient(
                circle at var(--mx) var(--my),
                rgba(255,255,255,0.2) 0%,
                rgba(255,255,255,0) 60%
            );
            background-position: calc(var(--mx) * 0.5) calc(var(--my) * 0.5);
            background-size: 200% 200%;
            mix-blend-mode: overlay;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card-container:hover .card-face::after {
            opacity: 1;
        }

        /* =========================================
           КНОПКА СЛЕДУЮЩЕЙ КАРТЫ
        ========================================= */
        #next-arrow {
            position: absolute;
            bottom: 50px;
            opacity: 0;
            visibility: hidden;
            background: rgba(103, 193, 245, 0.1);
            border: 2px solid #67c1f5;
            color: #67c1f5;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            transform: translateY(20px);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #next-arrow.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        #next-arrow:hover {
            background: rgba(103, 193, 245, 0.3);
            box-shadow: 0 0 15px rgba(103, 193, 245, 0.6);
        }

    </style>
</head>
<body>

    <button id="play-btn">FullArt</button>
    <div id="countdown">3</div>

    <div class="card-container" id="card">
        <div class="card-inner">
            <div class="card-face card-front" id="card-front"></div>
            <div class="card-face card-back" id="card-back"></div>
        </div>
    </div>

    <button id="next-arrow">➡ Следующая карта</button>

    <script>
        // =========================================
        // СПИСОК КАРТОЧЕК (Добавляй свои картинки сюда)
        // =========================================
        const deck = [
            { front: url:('кресло капуста.png'), back: "'кресло капуста текст.png'" },
            { front: "'заха хадид.png'", back: "'заха хадид текст.png'" },
            { front: "'рубашка3.png'", back: "'лицо3.png'" }
            // Можно продолжать список через запятую
        ];
        
        let currentIndex = 0;

        const playBtn = document.getElementById('play-btn');
        const countdownEl = document.getElementById('countdown');
        const card = document.getElementById('card');
        const cardFront = document.getElementById('card-front');
        const cardBack = document.getElementById('card-back');
        const nextArrow = document.getElementById('next-arrow');

        // Функция установки картинок
        function setCardImages(index) {
            cardFront.style.backgroundImage = `url(${deck[index].front})`;
            cardBack.style.backgroundImage = `url(${deck[index].back})`;
        }

        // Появление кнопки
        setTimeout(() => playBtn.classList.add('visible'), 500);

        // Логика стартовой кнопки
        playBtn.addEventListener('click', () => {
            playBtn.style.display = 'none';
            countdownEl.style.display = 'block';
            let count = 3;
            countdownEl.innerText = count;

            const timer = setInterval(() => {
                count--;
                if (count <= 0) {
                    clearInterval(timer);
                    countdownEl.style.display = 'none';
                    
                    // Устанавливаем первую карту и показываем контейнер
                    setCardImages(currentIndex);
                    card.style.display = 'block';
                } else {
                    countdownEl.innerText = count;
                }
            }, 800);
        });

        // ПОВОРОТ ПО КЛИКУ НА КАРТУ
        card.addEventListener('click', () => {
            // Если карта еще не перевернута — переворачиваем
            if (!card.classList.contains('flipped')) {
                card.classList.add('flipped');
                
                // Показываем стрелку, когда анимация переворота завершится
                setTimeout(() => {
                    nextArrow.classList.add('visible');
                }, 600);
            }
        });

        // ПЕРЕХОД К СЛЕДУЮЩЕЙ КАРТЕ ПО КЛИКУ НА СТРЕЛКУ
        nextArrow.addEventListener('click', () => {
            nextArrow.classList.remove('visible'); // Прячем стрелку
            card.classList.remove('flipped');      // Переворачиваем карту обратно

            // Ждем, пока карта перевернется рубашкой вверх, и меняем картинки
            setTimeout(() => {
                currentIndex++;
                
                // Если карты закончились, начинаем сначала
                if (currentIndex >= deck.length) {
                    currentIndex = 0;
                }
                
                setCardImages(currentIndex);
            }, 600);
        });

        // STEAM EFFECT LOGIC (не менялся)
        card.addEventListener('mousemove', (e) => {
            if (card.classList.contains('flipped')) return;

            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const xPct = (x / rect.width) * 100;
            const yPct = (y / rect.height) * 100;

            const rx = ((y / rect.height) - 0.5) * -25;
            const ry = ((x / rect.width) - 0.5) * 25;

            card.style.setProperty('--mx', `${xPct}%`);
            card.style.setProperty('--my', `${yPct}%`);
            card.style.setProperty('--rx', `${rx}deg`);
            card.style.setProperty('--ry', `${ry}deg`);
        });

        card.addEventListener('mouseleave', () => {
            card.style.setProperty('--rx', `0deg`);
            card.style.setProperty('--ry', `0deg`);
        });
    </script>
</body>
</html>
