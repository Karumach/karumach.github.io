<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FullArt Game</title>
    <style>
        :root {
            --mx: 50%;
            --my: 50%;
            --rx: 0deg;
            --ry: 0deg;
        }

        body {
            background-image: url('фон копия.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0e0e10; 
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* КНОПКА СТАРТА */
        #play-btn {
            position: relative;
            z-index: 10;
            width: 300px; /* Умеренный размер */
            height: 300px;
            background-color: rgba(103, 193, 245, 0.1); 
            background-image: url('фон буквы.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            
            cursor: pointer;
            color: #67c1f5;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            
            opacity: 0;
            transition: all 0.5s ease;
        }

        #play-btn.visible { 
            opacity: 1; 
        }

        #play-btn:hover {
            filter: brightness(1.2) drop-shadow(0 0 20px rgba(103, 193, 245, 0.8));
            transform: scale(1.05);
            background-color: rgba(103, 193, 245, 0.2);
        }

        #countdown {
            display: none;
            font-size: 100px;
            font-weight: bold;
            color: #67c1f5;
            text-shadow: 0 0 20px rgba(103, 193, 245, 0.8);
            z-index: 5;
        }

        /* КАРТОЧКА */
        .card-container {
            display: none;
            width: 320px;
            height: 480px;
            perspective: 1000px;
            z-index: 5;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(var(--rx)) rotateY(var(--ry));
            transition: transform 0.1s ease-out;
            cursor: pointer;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg) rotateX(0deg) !important;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card-face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-size: cover;
            background-position: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .card-back {
            transform: rotateY(180deg);
        }

        /* Блик (Steam эффект) */
        .card-face::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(125deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 200%;
            background-position: var(--mx) var(--my);
            mix-blend-mode: overlay;
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 15px;
        }

        .card-container:hover .card-face::after {
            opacity: 1;
        }

        /* КНОПКА ДАЛЕЕ */
        #next-arrow {
            display: none;
            margin-top: 30px;
            padding: 12px 30px;
            background: rgba(103, 193, 245, 0.2);
            border: 2px solid #67c1f5;
            color: #67c1f5;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
            z-index: 10;
        }

        #next-arrow.visible {
            display: block;
        }
    </style>
</head>
<body>

    <button id="play-btn">FullArt</button>
    <div id="countdown">3</div>

    <div class="card-container" id="card-container">
        <div class="card-inner" id="card-inner">
            <div class="card-face card-front" id="card-front"></div>
            <div class="card-face card-back" id="card-back"></div>
        </div>
    </div>

    <button id="next-arrow">Следующая карта ➡</button>

    <script>
        // СПИСОК КАРТ
        const deck = [
            { front: 'кресло капуста.png', back: 'кресло капуста тект.png' },
            { front: 'люстра необ.png', back: 'люстра необ текст.png' },
            { front: 'прозрачный стул.png', back: 'прозрачный стул текст.png' }
        ];
        
        let currentIndex = 0;

        const playBtn = document.getElementById('play-btn');
        const countdownEl = document.getElementById('countdown');
        const cardContainer = document.getElementById('card-container');
        const cardInner = document.getElementById('card-inner');
        const cardFront = document.getElementById('card-front');
        const cardBack = document.getElementById('card-back');
        const nextArrow = document.getElementById('next-arrow');

        // Показываем кнопку старта через полсекунды
        setTimeout(() => {
            playBtn.classList.add('visible');
        }, 500);

        function updateCardImages() {
            cardFront.style.backgroundImage = `url('${deck[currentIndex].front}')`;
            cardBack.style.backgroundImage = `url('${deck[currentIndex].back}')`;
        }

        // Логика кнопки старта
        playBtn.addEventListener('click', () => {
            playBtn.style.display = 'none';
            countdownEl.style.display = 'block';
            
            let count = 3;
            countdownEl.innerText = count;

            const timer = setInterval(() => {
                count--;
                if (count <= 0) {
                    clearInterval(timer);
                    countdownEl.style.display = 'none';
                    updateCardImages();
                    cardContainer.style.display = 'block';
                } else {
                    countdownEl.innerText = count;
                }
            }, 800);
        });

        // Переворот карты
        cardInner.addEventListener('click', () => {
            if (!cardContainer.classList.contains('flipped')) {
                cardContainer.classList.add('flipped');
                setTimeout(() => {
                    nextArrow.classList.add('visible');
                }, 600);
            }
        });

        // Кнопка "Далее"
        nextArrow.addEventListener('click', () => {
            nextArrow.classList.remove('visible');
            cardContainer.classList.remove('flipped');

            setTimeout(() => {
                currentIndex = (currentIndex + 1) % deck.length;
                updateCardImages();
            }, 600);
        });

        // Эффект наклона (Steam)
        cardContainer.addEventListener('mousemove', (e) => {
            if (cardContainer.classList.contains('flipped')) return;

            const rect = cardContainer.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const rx = ((y / rect.height) - 0.5) * -30;
            const ry = ((x / rect.width) - 0.5) * 30;

            cardContainer.style.setProperty('--mx', `${(x / rect.width) * 100}%`);
            cardContainer.style.setProperty('--my', `${(y / rect.height) * 100}%`);
            cardContainer.style.setProperty('--rx', `${rx}deg`);
            cardContainer.style.setProperty('--ry', `${ry}deg`);
        });

        cardContainer.addEventListener('mouseleave', () => {
            cardContainer.style.setProperty('--rx', '0deg');
            cardContainer.style.setProperty('--ry', '0deg');
        });
    </script>
</body>
</html>
